<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- أيقونة الموقع -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>" type="image/svg+xml">
    
    <title>RTLS ACCS</title>
    
    <!-- الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- ملفات CSS و JavaScript -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- نافذة عرض الصور -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="Fullscreen image">
        </div>
    </div>

    <!-- صفحة تسجيل الدخول -->
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2>🔐 تسجيل الدخول</h2>
            </div>
            
            <div id="errorMessage" class="error-message"></div>
            
            <div class="input-group">
                <label>👤 اسم المستخدم</label>
                <input type="text" id="username" placeholder="أدخل اسم المستخدم">
            </div>
            
            <div class="input-group">
                <label>🔑 كلمة المرور</label>
                <input type="password" id="password" placeholder="أدخل كلمة المرور">
            </div>
            
            <button class="login-btn" onclick="login()">تسجيل الدخول</button>
            
            <!-- زر الدخول كزائر -->
            <button class="guest-btn" onclick="loginAsGuest()" style="margin-top: 10px; background: #4CAF50; color: white; border: none; padding: 14px; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; width: 100%; font-family: 'Tajawal', sans-serif;">👤 الدخول كزائر</button>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div id="mainContainer" class="container" style="display: none;">
        <!-- لوحة تحكم المدير - تظهر فقط للمدير -->
        <div id="adminPanel" class="admin-panel" style="display: none;">
            <div class="admin-header">
                <h2><i>⚙️</i> لوحة التحكم</h2>
                <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
            </div>
            
            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchAdminTab('accounts')">📱 إدارة الحسابات</button>
                <button class="admin-tab" onclick="switchAdminTab('tools')">🛠️ إدارة الأدوات</button>
                <button class="admin-tab" onclick="switchAdminTab('news')">📰 إدارة الأخبار</button>
            </div>
            
            <!-- نماذج الإدارة (مخفية للزوار) -->
            <div id="accountsForm" class="admin-form">
                <h3>➕ إضافة حساب جديد</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>العنوان (عربي) *</label>
                        <input type="text" id="accountTitleAr" placeholder="مثال: حساب قراند 5">
                    </div>
                    <div class="form-group">
                        <label>العنوان (إنجليزي)</label>
                        <input type="text" id="accountTitleEn" placeholder="Example: GTA 5 Account">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>البريد الإلكتروني *</label>
                        <input type="email" id="accountEmail" placeholder="email@example.com">
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور *</label>
                        <input type="text" id="accountPassword" placeholder="password123">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>التفاصيل (عربي)</label>
                        <textarea id="accountDetailsAr" placeholder="وصف الحساب..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>التفاصيل (إنجليزي)</label>
                        <textarea id="accountDetailsEn" placeholder="Account details..."></textarea>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>نوع الحساب</label>
                        <select id="accountType">
                            <option value="free">🆓 مجاني</option>
                            <option value="premium">✨ مميز</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>رابط الصورة</label>
                        <input type="url" id="accountImage" placeholder="https://example.com/image.jpg">
                    </div>
                </div>
                
                <button class="submit-btn" onclick="addAccount()">إضافة الحساب</button>
            </div>
            
            <div id="toolsForm" class="admin-form" style="display: none;">
                <h3>➕ إضافة أداة جديدة</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>العنوان (عربي) *</label>
                        <input type="text" id="toolTitleAr" placeholder="مثال: برنامج تنظيف">
                    </div>
                    <div class="form-group">
                        <label>العنوان (إنجليزي)</label>
                        <input type="text" id="toolTitleEn" placeholder="Example: Cleaner Tool">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>رابط التحميل *</label>
                        <input type="url" id="toolDownloadUrl" placeholder="https://example.com/tool.zip">
                    </div>
                    <div class="form-group">
                        <label>المفتاح (اختياري)</label>
                        <input type="text" id="toolKey" placeholder="مفتاح التفعيل">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>التفاصيل (عربي)</label>
                        <textarea id="toolDetailsAr" placeholder="وصف الأداة..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>التفاصيل (إنجليزي)</label>
                        <textarea id="toolDetailsEn" placeholder="Tool details..."></textarea>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>رابط الصورة</label>
                    <input type="url" id="toolImage" placeholder="https://example.com/image.jpg">
                </div>
                
                <button class="submit-btn" onclick="addTool()">إضافة الأداة</button>
            </div>
            
            <div id="newsForm" class="admin-form" style="display: none;">
                <h3>➕ إضافة خبر جديد</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>العنوان (عربي) *</label>
                        <input type="text" id="newsTitleAr" placeholder="مثال: تحديث جديد">
                    </div>
                    <div class="form-group">
                        <label>العنوان (إنجليزي)</label>
                        <input type="text" id="newsTitleEn" placeholder="Example: New Update">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>المحتوى (عربي) *</label>
                        <textarea id="newsContentAr" placeholder="نص الخبر..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>المحتوى (إنجليزي)</label>
                        <textarea id="newsContentEn" placeholder="News content..."></textarea>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>رابط الصورة</label>
                    <input type="url" id="newsImage" placeholder="https://example.com/image.jpg">
                </div>
                
                <button class="submit-btn" onclick="addNews()">إضافة الخبر</button>
            </div>
            
            <!-- معاينة العناصر -->
            <div class="preview-section">
                <h3>📋 معاينة العناصر</h3>
                <div id="adminItemsList" class="admin-items-list"></div>
            </div>
        </div>

        <!-- الهيدر الرئيسي -->
        <header>
            <div class="language-switcher">
                <button class="lang-btn active" onclick="changeLanguage('ar')">🇸🇦 عربي</button>
                <button class="lang-btn" onclick="changeLanguage('en')">🇬🇧 English</button>
            </div>
            <h1 id="header-title">نشر حسابات وأدوات</h1>
            <p class="subtitle" id="header-subtitle">abumisfer - مشاركة وتحميل الحسابات والأدوات المميزة</p>
            <a href="https://rtls-lake.vercel.app/" target="_blank" class="header-link" id="header-link"></a>
        </header>

        <!-- أزرار التبديل -->
        <div class="content-switcher">
            <button class="switch-btn active" onclick="switchContent('accounts')" id="switch-accounts">📱 الحسابات</button>
            <button class="switch-btn" onclick="switchContent('tools')" id="switch-tools">🛠️ الأدوات</button>
            <button class="switch-btn" onclick="switchContent('news')" id="switch-news">📰 الأخبار</button>
        </div>

        <!-- شبكات العرض -->
        <div id="itemsContainer">
            <div class="items-grid" id="itemsGrid"></div>
            <div class="news-grid" id="newsGrid" style="display: none;"></div>
        </div>

        <!-- الفوتر -->
        <footer>
            <div class="footer-content">
                <div class="copyright" id="copyright-text">
                    © 2026 abumisfer - جميع الحقوق محفوظة
                </div>
                <div class="version" id="version-text">
                    الإصدار 1.0.5
                </div>
                <a href="https://discord.gg/abumisfer" target="_blank" class="discord-link" id="discord-text">
                    <i>💬</i>
                    تواصل معنا على Discord
                </a>
            </div>
        </footer>
    </div>

    <!-- سكريبت Tawk.to -->
    <script type="text/javascript">
        var Tawk_API = Tawk_API || {}, Tawk_LoadStart = new Date();
        (function() {
            var s1 = document.createElement("script"),
                s0 = document.getElementsByTagName("script")[0];
            s1.async = true;
            s1.src = 'https://embed.tawk.to/69b128c824af641c34610e86/1jje0ejs2';
            s1.charset = 'UTF-8';
            s1.setAttribute('crossorigin', '*');
            s0.parentNode.insertBefore(s1, s0);
        })();
    </script>

    <!-- ملف JavaScript الرئيسي -->
    <script src="script.js"></script>
</body>
</html>
