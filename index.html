<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- أيقونة الموقع (Favicon) - إضافة جديدة -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>" type="image/svg+xml">
    <link rel="shortcut icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>" type="image/svg+xml">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
    
    <title>نشر حسابات - abumisfer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            position: relative;
        }

        /* Language Switcher */
        .language-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        [dir="ltr"] .language-switcher {
            right: auto;
            left: 20px;
        }

        .lang-btn {
            background: none;
            border: 2px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            color: #666;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            background: #f0f0f0;
        }

        .lang-btn.active {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }

        h1 {
            font-size: 2.5em;
            color: #764ba2;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
        }

        /* شبكة الحسابات */
        .accounts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .account-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            position: relative;
        }

        .account-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .account-type {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff6b6b;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            z-index: 2;
        }

        [dir="ltr"] .account-type {
            left: auto;
            right: 10px;
        }

        .account-type.premium {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .account-type.free {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .account-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: #764ba2;
            overflow: hidden;
        }

        .account-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .account-card:hover .account-image img {
            transform: scale(1.05);
        }

        .account-content {
            padding: 20px;
        }

        .account-title {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #333;
        }

        .account-details {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .account-info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            margin-bottom: 15px;
            direction: ltr;
            text-align: left;
            font-size: 0.9em;
            word-break: break-all;
        }

        .account-info div {
            margin-bottom: 5px;
        }

        .account-info div:last-child {
            margin-bottom: 0;
        }

        .account-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .account-date {
            color: #999;
            font-size: 0.8em;
        }

        .btn-copy {
            background: #764ba2;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Tajawal', sans-serif;
        }

        .btn-copy:hover {
            background: #5a3780;
        }

        /* Footer */
        footer {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .copyright {
            color: #666;
            font-size: 1.1em;
        }

        .version {
            background: #f0f0f0;
            padding: 5px 15px;
            border-radius: 20px;
            color: #764ba2;
            font-weight: bold;
        }

        .discord-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #5865F2;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s;
            margin-top: 10px;
        }

        .discord-link:hover {
            transform: scale(1.05);
            background: #4752c4;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .accounts-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .account-image {
                height: 150px;
            }
            
            .language-switcher {
                position: static;
                justify-content: center;
                margin-bottom: 20px;
            }
        }

        /* مؤشر تحميل الصورة */
        .image-loading {
            position: relative;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .image-loading::after {
            content: "🖼️";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header with Language Switcher -->
        <header>
            <div class="language-switcher">
                <button class="lang-btn active" onclick="changeLanguage('ar')">🇸🇦 عربي</button>
                <button class="lang-btn" onclick="changeLanguage('en')">🇬🇧 English</button>
                <button class="lang-btn" onclick="changeLanguage('ru')">🇷🇺 Русский</button>
            </div>
            <h1 id="header-title"> نشر حسابات</h1>
            <p class="subtitle" id="header-subtitle">abumisfer - مشاركة وتحميل الحسابات المميزة</p>
        </header>

        <!-- قائمة الحسابات المنشورة -->
        <div id="accountsContainer">
            <div class="accounts-grid" id="accountsGrid">
                <!-- الحسابات ستظهر هنا من الكود -->
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <div class="footer-content">
                <div class="copyright" id="copyright-text">
                    © 2024 abumisfer - جميع الحقوق محفوظة
                </div>
                <div class="version" id="version-text">
                    الإصدار 1.0.0
                </div>
                <a href="https://discord.gg/abumisfer" target="_blank" class="discord-link" id="discord-text">
                    <i>💬</i>
                    تواصل معنا على Discord
                </a>
            </div>
        </footer>
    </div>

    <script>
        // =============================================
        // ترجمة النصوص
        // =============================================
        const translations = {
            ar: {
                headerTitle: " نشر حسابات",
                headerSubtitle: "abumisfer - مشاركة وتحميل الحسابات المميزة",
                premium: "✨ بريميوم",
                free: "🆓 مجاني",
                copyButton: "نسخ المعلومات",
                copySuccess: "✅ تم نسخ معلومات الحساب!",
                copyError: "❌ فشل النسخ، حاول مرة أخرى",
                copyright: "© 2024 abumisfer - جميع الحقوق محفوظة",
                version: "الإصدار 1.0.0",
                discord: "تواصل معنا على Discord",
                email: "📧",
                password: "🔑",
                date: "📅"
            },
            en: {
                headerTitle: " Account Sharing",
                headerSubtitle: "abumisfer - Share premium accounts",
                premium: "✨ Premium",
                free: "🆓 Free",
                copyButton: "Copy Info",
                copySuccess: "✅ Account info copied!",
                copyError: "❌ Copy failed, try again",
                copyright: "© 2024 abumisfer - All rights reserved",
                version: "Version 1.0.0",
                discord: "Contact us on Discord",
                email: "📧",
                password: "🔑",
                date: "📅"
            },
            ru: {
                headerTitle: " Обмен аккаунтами",
                headerSubtitle: "abumisfer - Делитесь премиум аккаунтами",
                premium: "✨ Премиум",
                free: "🆓 Бесплатно",
                copyButton: "Копировать",
                copySuccess: "✅ Информация скопирована!",
                copyError: "❌ Ошибка копирования",
                copyright: "© 2024 abumisfer - Все права защищены",
                version: "Версия 1.0.0",
                discord: "Связаться в Discord",
                email: "📧",
                password: "🔑",
                date: "📅"
            }
        };

        // =============================================
        // بيانات الحسابات (عدل هنا لإضافة حسابات جديدة)
        // =============================================
        
        let accounts = [
            {
                id: 1,
                type: 'free',
                title: {
                    ar: 'حساب ستيم',
                    en: 'steam acc',
                    ru: 'аккаунт Steam'
                },
                email: 'uwvehewx',
                password: 'acqczzkv6Zrt',
                details: {
                    ar: 'حساب ستيم فيه اجزاء رزنت ايفل سايلنت هيل مافيا جزئين تومب رايدر تروك سميولتر',
                    en: 'steam acc 9 game story',
                    ru: 'Сюжет игры Steam Acc 9'
                },
                date: '2026-02-24',
                imageUrl: 'https://cdn.discordapp.com/attachments/1469648062585770210/1475215028318900385/Screenshot_2026-02-23-01-03-15-76_a5f05134355d0c28d0e7113add1d3465.jpg?ex=699dfe0e&is=699cac8e&hm=f40ea0c9e36919c73832ac266f2325a581405eb2c421c5032512f5211ab562aa&'
            },
            {
                id: 2,
                type: 'free',
                title: {
                    ar: 'حساب اكس بوكس ',
                    en: 'xbox acc',
                    ru: 'аккаунты Xbox'
                },
                email: 'bbillssmith@hotmail.com',
                password: 'Rhythmic88',
                details: {
                    ar: 'فيه العاب حلوه و ممتعه ',
                    en: 'best games',
                    ru: 'лучшие игры'
                },
                date: '2026-02-24',
                imageUrl: 'https://cdn.discordapp.com/attachments/1469648509493055612/1475092576309874792/Screenshot_2026-02-22-16-52-21-95_22df7f1045b7c661e479946f0dad67d1.jpg?ex=699e34c4&is=699ce344&hm=5b09c80af5cb8970847cea6ad61326aced810a4204163d79b50e9df8e050397a&'
            },
            {
                
            }
            
            // =============================================
            // أضف حسابات جديدة هنا
            // مثال:
            /*
            {
                id: 4,
                type: 'premium',
                title: {
                    ar: 'العنوان بالعربي',
                    en: 'Title in English',
                    ru: 'Название на русском'
                },
                email: 'email@example.com',
                password: 'password123',
                details: {
                    ar: 'تفاصيل بالعربي',
                    en: 'Details in English',
                    ru: 'Детали на русском'
                },
                date: '2024-01-16',
                imageUrl: 'https://رابط-الصورة.com/image.jpg'
            },
            */
            // =============================================
        ];

        // اللغة الحالية
        let currentLang = 'ar';

        // عناصر DOM
        const accountsGrid = document.getElementById('accountsGrid');
        const headerTitle = document.getElementById('header-title');
        const headerSubtitle = document.getElementById('header-subtitle');
        const copyrightText = document.getElementById('copyright-text');
        const versionText = document.getElementById('version-text');
        const discordText = document.getElementById('discord-text');
        const langBtns = document.querySelectorAll('.lang-btn');

        // دالة تغيير اللغة
        window.changeLanguage = function(lang) {
            currentLang = lang;
            
            // تحديث شكل الأزرار
            langBtns.forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // تحديث اتجاه الصفحة
            if (lang === 'ar') {
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'ar';
            } else {
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = lang;
            }
            
            // تحديث النصوص الثابتة
            headerTitle.textContent = translations[lang].headerTitle;
            headerSubtitle.textContent = translations[lang].headerSubtitle;
            copyrightText.textContent = translations[lang].copyright;
            versionText.textContent = translations[lang].version;
            discordText.innerHTML = `<i>💬</i> ${translations[lang].discord}`;
            
            // إعادة عرض الحسابات باللغة الجديدة
            displayAccounts();
        };

        // دالة عرض الحسابات
        function displayAccounts() {
            accountsGrid.innerHTML = '';
            
            accounts.forEach(account => {
                const card = document.createElement('div');
                card.className = 'account-card';
                
                // الحصول على النصوص حسب اللغة الحالية
                const title = account.title[currentLang] || account.title.ar;
                const details = account.details[currentLang] || account.details.ar;
                const typeText = account.type === 'premium' ? 
                    translations[currentLang].premium : 
                    translations[currentLang].free;
                
                // قسم الصورة
                let imageHtml = '';
                if (account.imageUrl) {
                    imageHtml = `<img src="${account.imageUrl}" alt="${title}" onerror="this.onerror=null; this.parentElement.classList.add('image-loading'); this.style.display='none';">`;
                } else {
                    imageHtml = title.charAt(0);
                }
                
                card.innerHTML = `
                    <div class="account-type ${account.type}">
                        ${typeText}
                    </div>
                    <div class="account-image">
                        ${imageHtml}
                    </div>
                    <div class="account-content">
                        <h3 class="account-title">${title}</h3>
                        <div class="account-details">${details}</div>
                        <div class="account-info">
                            <div>${translations[currentLang].email} ${account.email}</div>
                            <div>${translations[currentLang].password} ${account.password}</div>
                        </div>
                        <div class="account-footer">
                            <span class="account-date">${translations[currentLang].date} ${account.date}</span>
                            <button class="btn-copy" onclick="copyAccount(${account.id})">
                                ${translations[currentLang].copyButton}
                            </button>
                        </div>
                    </div>
                `;
                
                accountsGrid.appendChild(card);
            });
        }

        // دالة نسخ معلومات الحساب
        window.copyAccount = function(accountId) {
            const account = accounts.find(a => a.id === accountId);
            if (account) {
                const title = account.title[currentLang] || account.title.ar;
                const details = account.details[currentLang] || account.details.ar;
                
                const textToCopy = `
${translations[currentLang].email.replace('📧', 'Account:')} ${title}
${translations[currentLang].email} ${account.email}
${translations[currentLang].password} ${account.password}
Details: ${details}
                `.trim();
                
                navigator.clipboard.writeText(textToCopy).then(() => {
                    alert(translations[currentLang].copySuccess);
                }).catch(() => {
                    alert(translations[currentLang].copyError);
                });
            }
        };

        // معالجة أخطاء الصور
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'IMG') {
                e.target.style.display = 'none';
                e.target.parentElement.classList.add('image-loading');
            }
        }, true);

        // عرض الحسابات عند تحميل الصفحة
        displayAccounts();
    </script>

    <!-- إضافة خط Tajawal -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
</body>
</html>
