            color: #333;

            max-width: 1200px;

            padding: 20px;
        }

            text-align: center;
            position: relative;
        }

        /* Language Switcher */
        .language-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        [dir="ltr"] .language-switcher {
            right: auto;
            left: 20px;
        }

        .lang-btn {
            background: none;
            border: 2px solid #e0e0e0;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            color: #666;
            transition: all 0.3s;
        }

        .lang-btn:hover {
            background: #f0f0f0;
        }

        .lang-btn.active {
            background: #764ba2;
            color: white;
            border-color: #764ba2;
        }

        /* Content Switcher (Accounts/Tools) */
        .content-switcher {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .switch-btn {
            background: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            font-family: 'Tajawal', sans-serif;
        }

        .switch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .switch-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        h1 {
            font-size: 2.5em;
            color: #764ba2;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.2em;
        }

        /* شبكة العناصر (حسابات/أدوات) */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .item-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            position: relative;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .item-type {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff6b6b;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            z-index: 2;
        }

        [dir="ltr"] .item-type {
            left: auto;
            right: 10px;
        }

        .item-type.premium {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .item-type.free {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .item-type.tool {
            background: linear-gradient(135deg, #FF8008 0%, #FFA03A 100%);
        }

        .item-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: #764ba2;
            overflow: hidden;
        }

        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .item-card:hover .item-image img {
            transform: scale(1.05);
        }

        .item-content {
            padding: 20px;
        }

        .item-title {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #333;
        }

        .item-details {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .item-info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            margin-bottom: 15px;
            direction: ltr;
            text-align: left;
            font-size: 0.9em;
            word-break: break-all;
        }

        .item-info div {
            margin-bottom: 5px;
        }

        .item-info div:last-child {
            margin-bottom: 0;
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        .item-date {
            color: #999;
            font-size: 0.8em;

            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;

        }

        .btn-download {
            background: #FF8008;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-family: 'Tajawal', sans-serif;
            text-decoration: none;
            display: inline-block;
        }

        .btn-download:hover {
            background: #FFA03A;
        }

        /* Footer */
        footer {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);

        .footer-content {
            display: flex;

            align-items: center;
            gap: 15px;

        .copyright {
            color: #666;

        .version {
            background: #f0f0f0;

            color: #764ba2;
            font-weight: bold;

            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;

        }

            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2em;
            opacity: 0.5;

                    }
                    
                    // زر التحميل
                    buttonHtml = `<button class="btn-download" onclick="downloadTool('${item.downloadUrl}')">
                        ${translations[currentLang].downloadButton} ⬇️
                    </button>`;
                } else {
                    infoHtml = `
                        <div>${translations[currentLang].email} ${item.email}</div>
                        <div>${translations[currentLang].password} ${item.password}</div>
                    `;
                    
                    // زر النسخ
                    buttonHtml = `<button class="btn-copy" onclick="copyItem(${item.id})">
                        ${translations[currentLang].copyButton}
                    </button>`;
                }
                
                card.innerHTML = `
                    <div class="item-type ${item.type}">
                        ${typeText}
                    </div>
                    <div class="item-image">
                        ${imageHtml}
                    </div>
                    <div class="item-content">
                        <h3 class="item-title">${title}</h3>
                        <div class="item-details">${details}</div>
                        <div class="item-info">
                            ${infoHtml}
                        </div>
                        <div class="item-footer">
                            <span class="item-date">${translations[currentLang].date} ${item.date}</span>
                            ${buttonHtml}
                        </div>
                    </div>
                `;
                
                itemsGrid.appendChild(card);
            });
        }

        // دالة نسخ معلومات الحساب
        window.copyItem = function(itemId) {
            // البحث في الحسابات فقط
            const item = accounts.find(i => i.id === itemId);
            
            if (item) {
                const title = item.title[currentLang] || item.title.ar;
                const details = item.details[currentLang] || item.details.ar;
                
                const textToCopy = `
${translations[currentLang].email.replace('📧', 'Account:')} ${title}
${translations[currentLang].email} ${item.email}
${translations[currentLang].password} ${item.password}
Details: ${details}
                `.trim();
                
                navigator.clipboard.writeText(textToCopy).then(() => {
                    alert(translations[currentLang].copySuccess);
                }).catch(() => {
                    alert(translations[currentLang].copyError);
                });
            }
        };

        // معالجة أخطاء الصور
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'IMG') {
                e.target.style.display = 'none';
                e.target.parentElement.classList.add('image-loading');
            }
        }, true);

        // عرض العناصر عند تحميل الصفحة
        displayItems();
    </script>

    <!-- إضافة خط Tajawal -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
</body>
</html>
