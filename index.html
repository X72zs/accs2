        // منع اختصارات لوحة المفاتيح الخطيرة
        document.addEventListener('keydown', function(e) {
            // منع F12
            if (e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            
            // منع Ctrl+Shift+I (فتح الأدوات)
            if (e.ctrlKey && e.shiftKey && e.key === 'I') {
                e.preventDefault();
                return false;
            }
            
            // منع Ctrl+Shift+J (فتح الكونسول)
            if (e.ctrlKey && e.shiftKey && e.key === 'J') {
                e.preventDefault();
                return false;
            }
            
            // منع Ctrl+Shift+C (فحص العنصر)
            if (e.ctrlKey && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                return false;
            }
            
            // منع Ctrl+U (عرض المصدر)
            if (e.ctrlKey && e.key === 'u') {
                e.preventDefault();
                return false;
            }
            
            // منع Ctrl+S (حفظ الصفحة)

                return false;
            }
        });

        // كشف محاولة فتح Dev Tools
        (function() {
            const devToolsChecker = {
                isOpen: false,
                
                check: function() {
                    const widthThreshold = window.outerWidth - window.innerWidth > 160;
                    const heightThreshold = window.outerHeight - window.innerHeight > 160;
                    
                    if (widthThreshold || heightThreshold) {
                        if (!this.isOpen) {
                            this.isOpen = true;
                            this.onOpen();
                        }
                    } else {
                        if (this.isOpen) {
                            this.isOpen = false;
                        }
                    }
                    
                    // التحقق باستخدام console.log
                    const element = new Image();
                    Object.defineProperty(element, 'id', {
                        get: function() {
                            if (!devToolsChecker.isOpen) {
                                devToolsChecker.isOpen = true;
                                devToolsChecker.onOpen();
                            }
                            return '';
                        }
                    });

        // اللغة الحالية
        let currentLang = 'ar';

        // عناصر DOM
        const itemsGrid = document.getElementById('itemsGrid');
        const newsGrid = document.getElementById('newsGrid');
        const headerTitle = document.getElementById('header-title');
        const headerSubtitle = document.getElementById('header-subtitle');
        const headerLink = document.getElementById('header-link');
        const copyrightText = document.getElementById('copyright-text');
        const versionText = document.getElementById('version-text');
        const discordText = document.getElementById('discord-text');
        const langBtns = document.querySelectorAll('.lang-btn');
        const switchAccountsBtn = document.getElementById('switch-accounts');
        const switchToolsBtn = document.getElementById('switch-tools');
        const switchNewsBtn = document.getElementById('switch-news');

        // دوال عرض الصورة بملء الشاشة
        window.openFullscreen = function(imageUrl) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.style.display = 'block';
            modalImg.src = imageUrl;
        }

        window.closeModal = function() {
            const modal = document.getElementById('imageModal');
            modal.style.display = 'none';
        }

        // إغلاق المودال عند الضغط على ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // دالة تغيير المحتوى
        window.switchContent = function(content) {
            currentContent = content;
            
            // تحديث شكل الأزرار
            switchAccountsBtn.classList.remove('active');
            switchToolsBtn.classList.remove('active');
            switchNewsBtn.classList.remove('active');
            
            if (content === 'accounts') {
                switchAccountsBtn.classList.add('active');
                itemsGrid.style.display = 'grid';
                newsGrid.style.display = 'none';
            } else if (content === 'tools') {
                switchToolsBtn.classList.add('active');
                itemsGrid.style.display = 'grid';
                newsGrid.style.display = 'none';
            } else {
                switchNewsBtn.classList.add('active');
                itemsGrid.style.display = 'none';
                newsGrid.style.display = 'grid';
            }
            
            // إعادة عرض العناصر
            displayItems();
        };

        // دالة تغيير اللغة
        window.changeLanguage = function(lang) {
            currentLang = lang;
            
            // تحديث شكل الأزرار
            langBtns.forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // تحديث اتجاه الصفحة
            if (lang === 'ar') {
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'ar';
            } else {
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = lang;
            }
            
            // تحديث النصوص الثابتة
            headerTitle.textContent = translations[lang].headerTitle;
            headerSubtitle.textContent = translations[lang].headerSubtitle;
            headerLink.textContent = translations[lang].headerLink;
            copyrightText.textContent = translations[lang].copyright;
            versionText.textContent = translations[lang].version;
            discordText.innerHTML = `<i>💬</i> ${translations[lang].discord}`;
            
            // تحديث أزرار التبديل
            switchAccountsBtn.textContent = translations[lang].switchAccounts;
            switchToolsBtn.textContent = translations[lang].switchTools;
            switchNewsBtn.textContent = translations[lang].switchNews;
            
            // إعادة عرض العناصر
            displayItems();
        };

        // دالة فتح رابط التحميل
        window.downloadTool = function(downloadUrl) {
            window.open(downloadUrl, '_blank');
        };

        // دالة عرض العناصر
        function displayItems() {
            if (currentContent === 'news') {
                displayNews();
            } else {
                displayAccountsAndTools();
            }
        }

        // دالة عرض الحسابات والأدوات
        function displayAccountsAndTools() {
            itemsGrid.innerHTML = '';
            
            // اختيار المصفوفة المناسبة
            const items = currentContent === 'accounts' ? accounts : tools;
            
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                
                // الحصول على النصوص حسب اللغة الحالية
                const title = item.title[currentLang] || item.title.ar;
                const details = item.details[currentLang] || item.details.ar;
                
                let typeText = '';
                if (item.type === 'tool') {
                    typeText = translations[currentLang].tool;
                } else {
                    typeText = item.type === 'premium' ? 
                        translations[currentLang].premium : 
                        translations[currentLang].free;
                }
                
                // قسم الصورة
                let imageHtml = '';
                if (item.imageUrl) {
                    imageHtml = `<img src="${item.imageUrl}" alt="${title}" onerror="this.onerror=null; this.parentElement.classList.add('image-loading'); this.style.display='none';">`;
                } else {
                    imageHtml = title.charAt(0);
                }
                
                // بناء محتوى البطاقة حسب النوع
                let infoHtml = '';
                let buttonHtml = '';
                
                if (item.type === 'tool') {
                    infoHtml = `<div>${translations[currentLang].downloadLink} <br> <small style="color: #666; word-break: break-all;">${item.downloadUrl}</small></div>`;
                    
                    if (item.key) {
                        infoHtml += `<div>${translations[currentLang].key} ${item.key}</div>`;
                    }
                    
                    buttonHtml = `<button class="btn-download" onclick="downloadTool('${item.downloadUrl}')">
                        ${translations[currentLang].downloadButton} ⬇️
                    </button>`;
                } else {
                    infoHtml = `
                        <div>${translations[currentLang].email} ${item.email}</div>
                        <div>${translations[currentLang].password} ${item.password}</div>
                    `;
                    
                    // تم إزالة زر النسخ
                    buttonHtml = ''; 
                }
                
                card.innerHTML = `
                    <div class="item-type ${item.type}">
                        ${typeText}
                    </div>
                    <div class="item-image" onclick="openFullscreen('${item.imageUrl}')">
                        ${imageHtml}
                        <div class="fullscreen-icon" onclick="event.stopPropagation(); openFullscreen('${item.imageUrl}')">⛶</div>
                    </div>
                    <div class="item-content">
                        <h3 class="item-title">${title}</h3>
                        <div class="item-details">${details}</div>
                        <div class="item-info">
                            ${infoHtml}
                        </div>
                        <div class="item-footer">
                            <span class="item-date">${translations[currentLang].date} ${item.date}</span>
                            ${buttonHtml}
                        </div>
                    </div>
                `;
                
                itemsGrid.appendChild(card);
            });
        }

        // دالة عرض الأخبار (بدون زر اقرأ المزيد)
        function displayNews() {
            newsGrid.innerHTML = '';
            
            news.forEach(item => {
                const card = document.createElement('div');
                card.className = 'item-card';
                
                // الحصول على النصوص حسب اللغة الحالية
                const title = item.title[currentLang] || item.title.ar;
                const content = item.content[currentLang] || item.content.ar;
                
                card.innerHTML = `
                    <div class="item-type news">
                        ${translations[currentLang].news}
                    </div>
                    <div class="item-image" onclick="openFullscreen('${item.imageUrl}')">
                        <img src="${item.imageUrl}" alt="${title}" onerror="this.onerror=null; this.parentElement.classList.add('image-loading'); this.style.display='none';">
                        <div class="fullscreen-icon" onclick="event.stopPropagation(); openFullscreen('${item.imageUrl}')">⛶</div>
                    </div>
                    <div class="item-content">
                        <h3 class="item-title">${title}</h3>
                        <div class="item-details">${content}</div>
                        <div class="item-footer">
                            <span class="item-date">${translations[currentLang].date} ${item.date}</span>
                        </div>
                    </div>
                `;
                
                newsGrid.appendChild(card);
            });
        }

        // معالجة أخطاء الصور
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'IMG') {
                e.target.style.display = 'none';
                e.target.parentElement.classList.add('image-loading');
            }
        }, true);

        // عرض العناصر عند تحميل الصفحة
        displayItems();
    </script>
